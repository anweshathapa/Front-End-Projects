<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gourmet Guide | Luxury Recipe Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <nav class="top-nav">
            <div class="theme-switch-wrapper">
                <span class="mode-label">Mode</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </nav>

        <header class="hero">
            <div class="logo-wrapper">
                <i class="fas fa-utensils"></i>
            </div>
            <h1>Recipe Finder</h1>
            <p class="subtitle">Sparkle in the kitchen with delicious recipes</p>
            
            <div class="search-wrapper">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="What shall we cook today?" />
                    <button id="search-btn">Explore</button>
                </div>
            </div>

            <div class="category-container">
                <button class="chip" data-category="Breakfast">Breakfast</button>
                <button class="chip" data-category="Vegetarian">Veggie</button>
                <button class="chip" data-category="Cake">Cake</button>
                <button class="chip" data-category="Seafood">Seafood</button>
                <button class="chip" data-category="Chicken">Chicken</button>
            </div>
        </header>

        <main>
            <div id="error-container" class="hidden"></div>
            <div id="result-heading"></div>
            <div id="meals" class="meals-grid"></div>

            <section id="meal-details" class="hidden">
                <button id="back-btn"><i class="fas fa-chevron-left"></i> Back to Gallery</button>
                <div class="meal-details-content"></div>
            </section>
        </main>

        <footer>
            <div class="footer-line"></div>
            <div class="footer-content">
                <p>© 2026 GOURMET GUIDE</p>
                <p>MADE WITH LOVE, FOR YOU</p>
                <div class="social-links">
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-pinterest"></i>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
